<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Kindred</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { margin-top: 0; text-align: center; font-size: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.35rem; color: #aaa; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: #4a90e2; }
        input::placeholder { color: rgba(255, 255, 255, 0.5); }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn:hover { background: #357abd; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #e74c3c; font-size: 0.9rem; margin-top: 0.5rem; }
        .signup-link { text-align: center; margin-top: 1.5rem; }
        .signup-link a { color: #4a90e2; text-decoration: none; }
        .signup-link a:hover { text-decoration: underline; }
        .back-link { color: #4a90e2; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-top: 1rem; text-align: center; width: 100%; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Sign In</h1>
        <p style="color:#aaa;text-align:center;font-size:0.9rem;margin-bottom:1.5rem;">Use your Gmail and password</p>

        <form id="signinForm" onsubmit="signin(event)">
            <div class="form-group">
                <label>Gmail address</label>
                <input type="email" name="email" placeholder="you@gmail.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Your password" required>
            </div>
            <div id="err" class="error"></div>
            <button type="submit" class="btn" id="btnSignin">Sign In</button>
        </form>

        <div class="signup-link">
            Don't have an account? <a href="/signup">Sign up for free</a>
        </div>
        <a href="/" class="back-link">← Back to Kindred</a>
    </div>

    <script>
        function signin(e) {
            e.preventDefault();
            if (window.location.protocol === 'file:') {
                document.getElementById('err').textContent = 'Please run the app from the server: open http://127.0.0.1:5000 in your browser after running python webapp/app.py';
                return;
            }
            var form = document.getElementById('signinForm');
            var email = form.email.value.trim().toLowerCase();
            var password = form.password.value;
            var err = document.getElementById('err');
            var btn = document.getElementById('btnSignin');
            err.textContent = '';
            btn.disabled = true;
            btn.textContent = 'Signing in...';
            fetch('/api/signin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, password: password })
            }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
            .then(function(res) {
                btn.disabled = false;
                btn.textContent = 'Sign In';
                if (res.ok) {
                    window.location.href = res.data.redirect || '/';
                } else {
                    err.textContent = res.data.error || 'Sign in failed';
                }
            }).catch(function() {
                btn.disabled = false;
                btn.textContent = 'Sign In';
                err.textContent = 'Network error. Please try again.';
            });
        }
    </script>
</body>
</html>
