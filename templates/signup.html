<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Kindred</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .auth-card {
            background: rgba(0, 0, 0, 0.3);
            padding: 2rem;
            border-radius: 12px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        h1 { margin-top: 0; text-align: center; font-size: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.35rem; color: #aaa; font-size: 0.9rem; }
        input {
            width: 100%;
            padding: 0.75rem;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 1rem;
        }
        input:focus { outline: none; border-color: #4a90e2; }
        input::placeholder { color: rgba(255, 255, 255, 0.5); }
        .btn {
            width: 100%;
            padding: 0.75rem;
            background: #4a90e2;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-top: 0.5rem;
        }
        .btn:hover { background: #357abd; }
        .btn:disabled { opacity: 0.6; cursor: not-allowed; }
        .error { color: #e74c3c; font-size: 0.9rem; margin-top: 0.5rem; }
        .success { color: #2ecc71; font-size: 0.9rem; margin-top: 0.5rem; }
        .step { display: none; }
        .step.active { display: block; }
        .back-link { color: #4a90e2; text-decoration: none; font-size: 0.9rem; display: inline-block; margin-top: 1rem; }
        .back-link:hover { text-decoration: underline; }
        .signin-link { text-align: center; margin-top: 1.5rem; }
        .signin-link a { color: #4a90e2; text-decoration: none; }
        .signin-link a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-card">
        <h1>Sign Up</h1>
        <p style="color:#aaa;text-align:center;font-size:0.9rem;margin-bottom:1.5rem;">Use your Gmail account and phone number</p>

        <div id="step1" class="step active">
            <form id="form1" onsubmit="sendCode(event)">
                <div class="form-group">
                    <label>Gmail address</label>
                    <input type="email" name="email" placeholder="you@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Phone number</label>
                    <input type="tel" name="phone" placeholder="(555) 123-4567" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="At least 6 characters" required minlength="6">
                </div>
                <div id="err1" class="error"></div>
                <button type="submit" class="btn" id="btnSend">Send verification code</button>
            </form>
        </div>

        <div id="step2" class="step">
            <p style="color:#aaa;font-size:0.9rem;">We sent a 6-digit code to your phone. Enter it below.</p>
            <form id="form2" onsubmit="verifyAndSignup(event)">
                <div class="form-group">
                    <label>Verification code</label>
                    <input type="text" name="code" placeholder="000000" maxlength="6" pattern="[0-9]{6}" required>
                </div>
                <div id="err2" class="error"></div>
                <button type="submit" class="btn" id="btnVerify">Verify and create account</button>
            </form>
            <a href="#" class="back-link" onclick="showStep(1); return false;">← Back to change details</a>
        </div>

        <div class="signin-link">
            Already have an account? <a href="/signin">Sign in</a>
        </div>
        <div style="text-align:center;margin-top:1rem;">
            <a href="/" class="back-link">← Back to Kindred</a>
        </div>
    </div>

    <script>
        var signupData = {};
        function showStep(n) {
            document.querySelectorAll('.step').forEach(function(el) { el.classList.remove('active'); });
            document.getElementById('step' + n).classList.add('active');
        }
        function sendCode(e) {
            e.preventDefault();
            if (window.location.protocol === 'file:') {
                document.getElementById('err1').textContent = 'Please run the app from the server: open http://127.0.0.1:5000 in your browser after running python webapp/app.py';
                return;
            }
            var form = document.getElementById('form1');
            var email = form.email.value.trim().toLowerCase();
            var phone = form.phone.value;
            var password = form.password.value;
            var err = document.getElementById('err1');
            var btn = document.getElementById('btnSend');
            err.textContent = '';
            if (!email.endsWith('@gmail.com')) {
                err.textContent = 'Please use a Gmail account (@gmail.com)';
                return;
            }
            btn.disabled = true;
            btn.textContent = 'Sending...';
            fetch('/api/send-verification', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email: email, phone: phone })
            }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
            .then(function(res) {
                btn.disabled = false;
                btn.textContent = 'Send verification code';
                if (res.ok) {
                    signupData = { email: email, phone: phone, password: password };
                    showStep(2);
                    document.getElementById('form2').code.focus();
                } else {
                    err.textContent = res.data.error || 'Failed to send code';
                }
            }).catch(function() {
                btn.disabled = false;
                btn.textContent = 'Send verification code';
                err.textContent = 'Network error. Please try again.';
            });
        }
        function verifyAndSignup(e) {
            e.preventDefault();
            var form = document.getElementById('form2');
            var code = form.code.value.trim();
            var err = document.getElementById('err2');
            var btn = document.getElementById('btnVerify');
            err.textContent = '';
            if (code.length !== 6) {
                err.textContent = 'Please enter the 6-digit code';
                return;
            }
            btn.disabled = true;
            btn.textContent = 'Verifying...';
            fetch('/api/verify-and-signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    email: signupData.email,
                    phone: signupData.phone,
                    password: signupData.password,
                    code: code
                })
            }).then(function(r) { return r.json().then(function(d) { return { ok: r.ok, data: d }; }); })
            .then(function(res) {
                btn.disabled = false;
                btn.textContent = 'Verify and create account';
                if (res.ok) {
                    window.location.href = res.data.redirect || '/';
                } else {
                    err.textContent = res.data.error || 'Verification failed';
                }
            }).catch(function() {
                btn.disabled = false;
                btn.textContent = 'Verify and create account';
                err.textContent = 'Network error. Please try again.';
            });
        }
    </script>
</body>
</html>
